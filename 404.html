<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan Montville</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/52202eaccb.js" crossorigin="anonymous"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
</head>

<body>
    <header>
        <section class="header-wrapper">
            <div>
                <h1>Ryan Montville</h1>
                <nav>
                        <input type="checkbox" class="nav-toggle" id="nav-toggle" />
                        <label for="nav-toggle">&#9776;</label>

                    <div class="nav-links">
                        <a href="about.html">About<span class="full-text"> Me</span></a>
                        <a href="index.html">Portfolio</a>
                        <a href="https://ryanmontville.github.io/my-adventure-blog/">
                            <span class="full-text">My Adventure Blog</span>
                            <span class="short-text">Disney Blog</span>
                        </a>
                        <a href="https://www.github.com/RyanMontville" title="GitHub" target="blank"><i
                                class="fa-brands fa-github"></i><span class="mobile-social"> GitHub</span></a>
                        <a href="https://www.linkedin.com/in/ryanmontville" title="LinkedIn" target="blank"><i
                                class="fa-brands fa-linkedin-in"></i><span class="mobile-social"> LinkedIn</span></a>
                        <a href="https://www.instagram.com/ryanmontville/" title="Instagram" target="blank"><i
                                class="fa-brands fa-instagram"></i><span class="mobile-social"> Instagram</span></a>
                        <div class="theme-switch-wrapper">
                            <input type="checkbox" class="checkbox" id="checkbox" />
                            <label for="checkbox" class="label theme-switch">
                                <span class="material-symbols-outlined">dark_mode</span>
                                <span class="material-symbols-outlined">light_mode</span>
                                <div class='ball' />
                            </label>
                        </div>
                    </div>

                </nav>
            </div>
            <img src="images/main.png" />
        </section>
    </header>
    <main>
        <h3>Couldn't find what you were looking for. <a href="https://ryanmontville.github.io/">Click to go back to Ryanmontville.github.io</a></h3>
<img src="https://ryanmontville.github.io/images/404error.png" style="width: 100%; object-fit: contain;" />
<p style="text-align: center">Tumbeasts by <a href="http://theoatmeal.com/">Matthew Inman</a></p>
    </main>
    <script>
        const toggleSwitch = document.querySelector('#checkbox');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);

            if (currentTheme === 'dark') {
                toggleSwitch.checked = true;
            }
        }

        function switchTheme(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        }

        toggleSwitch.addEventListener('change', switchTheme, false);
    </script>
</body>

</html>
